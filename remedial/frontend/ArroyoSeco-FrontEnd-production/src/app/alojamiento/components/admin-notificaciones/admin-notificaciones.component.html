<section class="notificaciones">
  <div class="toolbar">
    <div class="search">
      <input
        type="text"
        placeholder="Buscar Notificaciones"
        [(ngModel)]="searchTerm"
      />
      <button type="button" aria-label="Buscar">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zM10 14a4 4 0 1 1 0-8 4 4 0 0 1 0 8z" />
        </svg>
      </button>
    </div>
  </div>

  <div class="table-wrapper" *ngIf="filteredNotificaciones.length; else emptyState">
    <table>
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Teléfono</th>
          <th>Negocio</th>
          <th>Estatus</th>
          <th class="actions">Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let notificacion of filteredNotificaciones">
          <td data-label="Nombre">{{ notificacion.nombre }}</td>
          <td data-label="Teléfono">{{ notificacion.telefono }}</td>
          <td data-label="Negocio">{{ notificacion.negocio }}</td>
          <td data-label="Estatus">
            <span class="pill">
              {{ notificacion.estatus }}
            </span>
          </td>
          <td data-label="Acciones" class="actions">
            <button type="button" class="btn-icon btn-icon--view" title="Ver notificación">
              <svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
            </button>
            <button type="button" class="btn-icon btn-icon--mark" [class.btn-icon--done]="notificacion.leida" [disabled]="notificacion.leida" [title]="notificacion.leida ? 'Leída' : 'Marcar como leída'" (click)="marcarLeida(notificacion)">
              <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <ng-template #emptyState>
    <div class="empty">
      <p>No se encontraron notificaciones para "{{ searchTerm }}".</p>
    </div>
  </ng-template>
</section>
