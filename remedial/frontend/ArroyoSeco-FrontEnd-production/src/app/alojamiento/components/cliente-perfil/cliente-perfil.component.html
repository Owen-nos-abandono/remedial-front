<section class="perfil">
  <div class="tabs">
    <h2>Mi Perfil</h2>
  </div>

  <div class="profile-card">
    <form (ngSubmit)="guardarPerfil()">
      <div class="form-group">
        <label for="nombre">Nombre completo</label>
        <input
          type="text"
          id="nombre"
          [(ngModel)]="perfil().nombre"
          name="nombre"
          required
        />
      </div>

      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <input
          type="email"
          id="email"
          [(ngModel)]="perfil().email"
          name="email"
          required
        />
      </div>

      <div class="form-group">
        <label for="telefono">Teléfono</label>
        <input
          type="tel"
          id="telefono"
          [(ngModel)]="perfil().telefono"
          name="telefono"
          required
          maxlength="15"
          placeholder="Ej: 442 123 4567"
          (blur)="validarTelefono()"
        />
        <small class="field-hint">10 dígitos sin código de país. Ej: 442 123 4567</small>
        <small class="field-error" *ngIf="errorTelefono">{{ errorTelefono }}</small>
      </div>

      <div class="form-group">
        <label for="sexo">Sexo</label>
        <select id="sexo" [(ngModel)]="perfil().sexo" name="sexo">
          <option value="">Selecciona una opción</option>
          <option *ngFor="let opcion of opcionesSexo" [value]="opcion.value">{{ opcion.label }}</option>
        </select>
      </div>

      <div class="form-group">
        <label for="direccion">Dirección</label>
        <input
          type="text"
          id="direccion"
          [(ngModel)]="perfil().direccion"
          name="direccion"
        />
      </div>

      <div class="form-group">
        <label for="ciudad">Ciudad</label>
        <input
          type="text"
          id="ciudad"
          [(ngModel)]="perfil().ciudad"
          name="ciudad"
        />
      </div>

      <div class="form-actions">
        <button type="submit" class="btn-primary">Guardar cambios</button>
      </div>
    </form>
  </div>

  <div class="security-section">
    <h3>Seguridad</h3>
    <div class="security-card">
      <h4>Cambiar contraseña</h4>
      <p>Actualiza tu contraseña regularmente para mantener tu cuenta segura.</p>
      <button type="button" class="btn-secondary" (click)="toggleCambioPassword()">
        {{ mostrarCambioPassword ? 'Cancelar' : 'Cambiar contraseña' }}
      </button>

      <form *ngIf="mostrarCambioPassword" class="password-form" (ngSubmit)="cambiarPassword()">
        <div class="form-group">
          <label for="passwordActual">Contraseña actual</label>
          <input
            type="password"
            id="passwordActual"
            name="passwordActual"
            [(ngModel)]="passwordActual"
            autocomplete="current-password"
            required
          />
        </div>

        <div class="form-group">
          <label for="passwordNueva">Nueva contraseña</label>
          <input
            type="password"
            id="passwordNueva"
            name="passwordNueva"
            [(ngModel)]="passwordNueva"
            autocomplete="new-password"
            minlength="8"
            required
          />
          <small class="password-hint">Mínimo 8 caracteres, una mayúscula, un número y un símbolo especial.</small>
        </div>

        <div class="form-group">
          <label for="passwordConfirmacion">Confirmar nueva contraseña</label>
          <input
            type="password"
            id="passwordConfirmacion"
            name="passwordConfirmacion"
            [(ngModel)]="passwordConfirmacion"
            autocomplete="new-password"
            minlength="8"
            required
          />
        </div>

        <div class="password-actions">
          <button type="submit" class="btn-primary" [disabled]="submittingPassword">
            {{ submittingPassword ? 'Guardando...' : 'Actualizar contraseña' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</section>
