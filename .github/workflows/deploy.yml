name: Deploy Angular UTEQ

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ESTE PASO CREA EL ARCHIVO DIRECTAMENTE PARA QUE NO FALLE
      - name: Create Dockerfile dynamically
        run: |
          cat <<EOF > Dockerfile
          FROM node:18-alpine AS build-step
          WORKDIR /app
          COPY package*.json ./
          RUN npm install
          COPY . .
          RUN npm run build
          FROM nginx:alpine
          # Nota: Si falla el COPY posterior, revisaremos el nombre de la carpeta dist
          COPY --from=build-step /app/dist/arroyo-seco-frontend /usr/share/nginx/html
          EXPOSE 80
          CMD ["nginx", "-g", "daemon off;"]
          EOF

      - name: Build and push Docker image
        run: |
          # Ahora usamos el archivo que acabamos de crear arriba
          docker build -t ${{ secrets.DOCKER_USER }}/remedial-front:latest .
          docker push ${{ secrets.DOCKER_USER }}/remedial-front:latest

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: riveradiazjanine
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            docker stop app-frontend || true
            docker rm app-frontend || true
            docker pull ${{ secrets.DOCKER_USER }}/remedial-front:latest
            docker run -d --name app-frontend -p 3001:80 ${{ secrets.DOCKER_USER }}/remedial-front:latest
